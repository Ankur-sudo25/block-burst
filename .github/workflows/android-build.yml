name: Build Android APK and AAB

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Install Dependencies
      run: npm install

    - name: Build Web Game
      run: npm run build

    - name: Sync Capacitor
      run: npx cap sync android

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '21'

    - name: Generate Release Keystore
      run: keytool -genkeypair -v -keystore android/block-burst-release.keystore -alias block-burst -keyalg RSA -keysize 2048 -validity 10000 -storepass BlockBurst2026 -keypass BlockBurst2026 -dname "CN=Block Burst, OU=Dev, O=DevLance, L=India, ST=India, C=IN"

    - name: Make gradlew executable
      run: chmod +x ./android/gradlew

    - name: Build Debug APK
      working-directory: ./android
      run: ./gradlew assembleDebug

    - name: Build Release AAB (Signed)
      working-directory: ./android
      run: ./gradlew bundleRelease

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug.apk
        path: android/app/build/outputs/apk/debug/app-debug.apk

    - name: Upload Release AAB
      uses: actions/upload-artifact@v4
      with:
        name: app-release.aab
        path: android/app/build/outputs/bundle/release/app-release.aab
